<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Landing Alterna | ADECOM</title>
  <style>
    :root {
      --paper: #f6f2e9;
      --ink: #122030;
      --teal: #1a6d66;
      --teal-soft: #4b998f;
      --sand: #d9cbac;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(900px 450px at -10% -15%, #d7e8df 0%, transparent 60%),
        radial-gradient(700px 380px at 110% 120%, #cddfda 0%, transparent 62%),
        var(--paper);
    }
    .shell {
      width: min(1080px, 94%);
      margin: 26px auto;
    }
    .top {
      background: linear-gradient(120deg, var(--teal), var(--teal-soft));
      color: #ecf8f6;
      border-radius: 18px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title {
      margin: 0;
      font-size: clamp(1.4rem, 3.3vw, 2rem);
      letter-spacing: .2px;
    }
    .logout-btn {
      border: 1px solid rgba(236, 248, 246, 0.46);
      background: rgba(236, 248, 246, 0.14);
      color: #ecf8f6;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      padding: 10px 14px;
    }
    .hero {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid #d7cfbe;
      border-radius: 16px;
      box-shadow: 0 18px 36px rgba(19, 34, 48, 0.12);
      padding: 22px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    }
    .card p {
      margin: 0;
      line-height: 1.55;
      color: #334556;
    }
    .pill {
      display: inline-block;
      margin-top: 12px;
      background: #e8f4f2;
      color: #215f5a;
      border: 1px solid #c6dfdb;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .35px;
      padding: 8px 11px;
    }
    .kpi {
      display: grid;
      gap: 10px;
    }
    .kpi-box {
      border-radius: 12px;
      border: 1px solid #d9cfbd;
      background: #fffaf0;
      padding: 12px;
    }
    .kpi-box strong {
      display: block;
      font-size: 20px;
      color: #1f3448;
    }
    .kpi-box span {
      font-size: 13px;
      color: #4a5a6b;
    }
    @media (max-width: 860px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <h1 class="title">Gestion y Productividad Lavanderia</h1>
      <form method="post" action="{{ url_for('logout') }}">
        <button class="logout-btn" type="submit">Cerrar sesion</button>
      </form>
    </header>

    <section class="hero">
      <article class="card">
        <h2>Acceso aislado habilitado</h2>
        <p>
          Esta landing queda separada del dashboard principal para trabajar un flujo distinto
          con un usuario dedicado.
        </p>
        <span class="pill">Ruta: /otra-landing</span>
      </article>

      <aside class="kpi">
        <article class="kpi-box">
          <strong>1</strong>
          <span>Usuario alterno activo</span>
        </article>
        <article class="kpi-box">
          <strong>100%</strong>
          <span>Aislamiento de navegacion</span>
        </article>
      </aside>
    </section>
  </div>
</body>
</html>
